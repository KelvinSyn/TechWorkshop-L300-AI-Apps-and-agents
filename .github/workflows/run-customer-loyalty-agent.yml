name: Run Customer Loyalty Agent

on:
  push:
    branches:
      - main
    paths:
      - 'src/app/agents/customerLoyaltyAgent_initializer.py'
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/app/tools/discountLogic.py'
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC Azure login
  contents: read

jobs:
  run-agent:
    name: Run Customer Loyalty Agent
    runs-on: ubuntu-latest

    env:
      # Azure AI Foundry connection (required by azure.ai.projects)
      FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
      FOUNDRY_API_VERSION: "2025-01-01-preview"

      # GPT model credentials
      gpt_endpoint: ${{ secrets.GPT_ENDPOINT }}
      gpt_deployment: "gpt-5-mini"
      gpt_api_key: ${{ secrets.GPT_API_KEY }}
      gpt_api_version: "2025-01-01-preview"

      # Application Insights (optional tracing)
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
      OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT: "true"
      AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED: "true"

      # Agent IDs
      customer_loyalty: "customer-loyalty"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC / Workload Identity Federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r src/requirements.txt

      - name: Run Customer Loyalty Agent initializer
        working-directory: src
        run: python app/agents/customerLoyaltyAgent_initializer.py
